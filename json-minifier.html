<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minify کننده فایل JSON (لاتی و غیره)</title>
    <link rel="stylesheet" href="styles.css">
    <meta name="description" content="A lightweight browser-based JSON minifier with drag-and-drop support.">
</head>
<body>
<div class="card">
    <div class="lang-switcher">
        <label for="langSelect" data-i18n="langLabel">زبان:</label>
        <select id="langSelect">
            <option value="fa">فارسی</option>
            <option value="en">English</option>
            <option value="zh">中文</option>
            <option value="hi">हिंदी</option>
        </select>
    </div>

    <a class="back-link" href="index.html">← بازگشت به صفحه اصلی</a>
    <h1 id="pageTitle" data-i18n="jsonPageTitle">🗜️ Minify کننده JSON</h1>
    <div class="sub" id="pageSubtitle" data-i18n="jsonPageSubtitle">حذف فاصله‌ها، اینترها و فشرده‌سازی فایل لاتی یا هر JSON دیگر</div>

    <div class="drop-area" id="dropZone">
        <span id="dropText" data-i18n="jsonDropText">📂 فایل JSON رو بکش اینجا یا کلیک کن</span>
        <input type="file" id="fileInput" accept=".json" style="display: none;">
    </div>

    <div id="status" class="info"></div>
    <button id="downloadBtn" style="display: none;" data-i18n="jsonDownloadBtn">📥 دانلود فایل Minified شده</button>
</div>
<footer>
    <span id="footerText" data-i18n="jsonFooterText">فقط ظاهر فایل فشرده میشه — ساختار و محتوا کاملاً سالم می‌مونه.</span>
</footer>

<script src="script.js"></script>
<script src="json-minifier.js"></script>
</body>
</html>
